services:
  # ---------- Banco de dados ----------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: casa
      POSTGRES_PASSWORD: casa_senha
      POSTGRES_DB: casa_temporada
    ports:
      - "5433:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
      # O schema roda automaticamente apenas na PRIMEIRA inicialização
      # (quando o volume está vazio).
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casa -d casa_temporada"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ---------- Aplicação (painel + APIs) ----------
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_CRON_SECRET: ${NEXT_PUBLIC_CRON_SECRET:-}
        NEXT_PUBLIC_AIRBNB_BLOCK_ICAL_SECRET: ${NEXT_PUBLIC_AIRBNB_BLOCK_ICAL_SECRET:-}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://casa:casa_senha@db:5432/casa_temporada
      CRON_SECRET: ${CRON_SECRET:-troque-este-token}
      NEXT_PUBLIC_CRON_SECRET: ${NEXT_PUBLIC_CRON_SECRET:-}
      AIRBNB_BLOCK_ICAL_SECRET: ${AIRBNB_BLOCK_ICAL_SECRET:-}
      NEXT_PUBLIC_AIRBNB_BLOCK_ICAL_SECRET: ${NEXT_PUBLIC_AIRBNB_BLOCK_ICAL_SECRET:-}
      AIRBNB_ICAL_URL: ${AIRBNB_ICAL_URL:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v20.0}
      CASA_NOME: ${CASA_NOME:-Casa de Temporada Olímpia}
    ports:
      - "3000:3000"

  # ---------- Scheduler (dispara automações) ----------
  # Serviço leve: a cada 15 min chama /api/cron (mensagens) e a cada 60 min
  # chama /api/sync-airbnb (importa o calendário do Airbnb).
  scheduler:
    image: node:20-alpine
    restart: unless-stopped
    depends_on:
      - app
    environment:
      APP_URL: http://app:3000
      CRON_SECRET: ${CRON_SECRET:-troque-este-token}
    volumes:
      - ./scheduler.mjs:/scheduler.mjs:ro
    command: ["node", "/scheduler.mjs"]

volumes:
  dbdata:
